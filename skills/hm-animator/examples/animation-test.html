<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Animation Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: system-ui, sans-serif;
    }
    svg { width: 300px; height: 300px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
      .circle {
        transform-origin: 50px 50px;
        animation: pulse 2s ease-in-out infinite;
      }
      .path {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 2s ease-out forwards;
      }
      .morph {
        animation: morph 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; r: 15; }
        50% { opacity: 1; r: 20; }
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes morph {
        0%, 100% { d: path('M 30 50 Q 50 30 70 50 Q 50 70 30 50'); }
        50% { d: path('M 30 50 Q 50 70 70 50 Q 50 30 30 50'); }
      }
    </style>

    <circle class="circle" cx="50" cy="50" r="15" fill="#6366f1" opacity="0.3" />
    <path class="path" d="M 20 50 Q 50 20 80 50 Q 50 80 20 50 Z" stroke="#6366f1" stroke-width="2" fill="none" />
    <path class="morph" d="M 30 50 Q 50 30 70 50 Q 50 70 30 50" stroke="#f472b6" stroke-width="2" fill="none" />
  </svg>
</body>
</html>
