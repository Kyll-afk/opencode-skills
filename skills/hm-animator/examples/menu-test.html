<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamburger Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: system-ui, sans-serif;
    }

    .hamburger {
      width: 48px;
      height: 48px;
      cursor: pointer;
    }

    .hamburger svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .line {
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
    }

    /* Path 1: Top horizontal → top-left to bottom-right diagonal */
    .line-1 {
      transition: d 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hamburger.open .line-1 {
      d: path("M 10 10 L 40 40");
    }

    /* Path 2: Middle → fades */
    .line-2 {
      transition: opacity 0.15s;
    }
    .hamburger.open .line-2 {
      opacity: 0;
    }

    /* Path 3: Bottom horizontal → bottom-left to top-right diagonal */
    .line-3 {
      transition: d 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hamburger.open .line-3 {
      d: path("M 10 40 L 40 10");
    }

    .hamburger:hover .line { stroke: #6366f1; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="hamburger" onclick="this.classList.toggle('open')" role="button" aria-label="Toggle menu">
    <svg viewBox="0 0 50 50">
      <path class="line line-1" d="M 10 12 L 40 12" />
      <path class="line line-2" d="M 10 25 L 40 25" />
      <path class="line line-3" d="M 10 38 L 40 38" />
    </svg>
  </div>
</body>
</html>
